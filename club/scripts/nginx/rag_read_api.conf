# Read-only RAG API — только IP 144.124.238.220, прокси на localhost:8790
#
# Установка:
#   sudo cp scripts/nginx/rag_read_api.conf /etc/nginx/snippets/club-rag-read-api.conf
#   В HTTPS server {} для mironbot.online (или другого vhost) добавить:
#     include snippets/club-rag-read-api.conf;
#   sudo nginx -t && sudo systemctl reload nginx
#
# URL с удалёнки: https://mironbot.online/club-rag/v1/meta
# (путь /club-rag/ срезается при proxy_pass)

location /club-rag/ {
    allow 144.124.238.220;
    deny all;

    proxy_pass http://127.0.0.1:8790/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_connect_timeout 30s;
    proxy_read_timeout 120s;
    client_max_body_size 64k;
}
